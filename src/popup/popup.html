<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI2Prompt</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="app-header">
        <div class="brand">
          <span class="brand-dot"></span>
          <div class="brand-text">
            <span class="brand-name">UI2Prompt</span>
            <span class="brand-tagline" id="tagline"></span>
          </div>
        </div>
        <div class="head-actions">
          <button id="langBtn" class="icon-btn" type="button" aria-haspopup="true"></button>
          <button id="themeBtn" class="icon-btn" type="button"></button>
          <button id="settingsBtn" class="icon-btn" type="button"></button>
          <button id="helpBtn" class="icon-btn" type="button"></button>
          <button id="modeBtn" class="mode-btn" type="button"></button>
        </div>
      </header>

      <div class="toolbar">
        <div id="filters" class="filters"></div>
      </div>

      <main id="list" class="list"></main>

      <section id="projects" class="projects"></section>

      <footer class="app-footer">
        <button id="copyPage" class="btn ghost" type="button"></button>
        <button id="copyAll" class="btn ghost" type="button"></button>
        <button id="downloadPage" class="btn ghost" type="button"></button>
        <button id="downloadAll" class="btn ghost has-caret" type="button"></button>
        <button id="screenshot" class="btn ghost" type="button"></button>
        <button id="clearPage" class="btn danger-text" type="button"></button>
        <button id="downloadFull" class="btn ghost has-caret span-2" type="button"></button>
      </footer>

      <div id="menu" class="menu" role="menu"></div>

      <div id="settingsDialog" class="dialog" role="dialog" aria-modal="true"></div>
      <div id="guideDialog" class="dialog guide" role="dialog" aria-modal="true"></div>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
