name: Release

# Build the extension and publish dist/ as a downloadable zip whenever a
# version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package dist
        run: |
          cd dist
          zip -r ../ui2prompt-dist.zip .
          cd ..
          ls -lh ui2prompt-dist.zip

      - name: Build loop skill
        run: |
          npm run skill
          ls -lh dist-skill/ui2prompt-skill.zip dist-skill/install.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ui2prompt-dist.zip
            dist-skill/ui2prompt-skill.zip
            dist-skill/install.sh
          generate_release_notes: true
          fail_on_unmatched_files: true
